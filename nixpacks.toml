# Configuração do Nixpacks para Railway — pina Python 3.11 (estável)
# evita falhas de build com Python 3.13 (versão muito recente).

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "python main.py"
